
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 350px;
      padding: 20px;
      font-family: Arial, sans-serif;
    }
    h3 {
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 15px;
    }
    .status {
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      text-align: center;
      font-style: italic;
    }
    .active {
      background: #d4edda;
      color: #155724;
    }
    .inactive {
      background: #f8d7da;
      color: #721c24;
    }
    button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .export {
      background: #007bff;
      color: white;
    }
    .clear {
      background: red;
      color: white;
    }
    .count {
      font-size: 15px;
      font-weight: bold;
      text-align: center;
      margin: 10px 0;
    }

  </style>
</head>

<body>

  <h3>Instagram Scraper</h3>

  <div id="status" class="status inactive">
    INACTIVE
  </div>

  <div class="count">
    Total Scraped: <span id="postCount">0</span>
  </div>

  <button id="exportData" class="export">Export JSON</button>
  <button id="clearData" class="clear">Clear Data</button>

  <script src="popup.js"></script>

</body>
</html>
